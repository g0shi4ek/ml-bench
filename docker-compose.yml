services:

  go-bench:
    build:
      context: .
      dockerfile: docker/Dockerfile.go
    image: ml-bench/go-bench:latest
    container_name: ml-bench-go
    volumes:
      - ./results:/app/results
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
    environment:
      - GOMAXPROCS=2
      - ASSUME_NO_MOVING_GC_UNSAFE_RISK_IT_WITH=go1.24

  python-bench:
    build:
      context: .
      dockerfile: docker/Dockerfile.python
    image: ml-bench/python-bench:latest
    container_name: ml-bench-python
    working_dir: /app
    volumes:
      - ./results:/app/results
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G  # PyTorch требует больше RAM
    environment:
      - MPLBACKEND=Agg

  compare:
    image: ml-bench/python-bench:latest
    container_name: ml-bench-compare
    working_dir: /app
    volumes:
      - ./results:/app/results
    command: ["python", "compare_results.py"]
    depends_on:
      go-bench:
        condition: service_completed_successfully
      python-bench:
        condition: service_completed_successfully
